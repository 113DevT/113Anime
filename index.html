<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>113 Anime</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700;800&family=Zen+Kaku+Gothic+New:wght@300;400;500;700&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:         #fdf6f0;
  --bg2:        #fef9f5;
  --paper:      #fffaf7;
  --petal1:     #f2a7b8;
  --petal2:     #e8829a;
  --petal3:     #fcd5de;
  --petal4:     #f9b8c8;
  --branch:     #8b5e6a;
  --ink:        #2d1f26;
  --ink2:       #5c3d4a;
  --muted:      #b09aa4;
  --accent:     #d4547a;
  --accent2:    #8b4f7a;
  --gold:       #c9975a;
  --green:      #7a9e7e;
  --border:     rgba(212,84,122,0.12);
  --shadow:     rgba(45,31,38,0.08);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Zen Kaku Gothic New', 'Noto Sans JP', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── PAPER TEXTURE ── */
body::before {
  content:'';
  position:fixed; inset:0; z-index:0;
  background-image:
    radial-gradient(ellipse at 20% 0%, rgba(242,167,184,0.18) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 0%, rgba(252,213,222,0.22) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 100%, rgba(201,151,90,0.08) 0%, transparent 60%);
  pointer-events:none;
}

/* ── SAKURA PETALS CANVAS ── */
#sakuraCanvas {
  position:fixed; inset:0;
  z-index:1;
  pointer-events:none;
}

/* ══════════════ NAVBAR ══════════════ */
nav {
  position:sticky; top:0; z-index:500;
  height:72px;
  background: rgba(253,246,240,0.88);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(212,84,122,0.15);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 52px;
  gap:24px;
  box-shadow: 0 2px 30px rgba(212,84,122,0.07);
}

/* decorative top line */
nav::before {
  content:'';
  position:absolute; top:0; left:0; right:0;
  height:2px;
  background: linear-gradient(90deg,
    transparent 0%,
    var(--petal1) 20%,
    var(--accent) 50%,
    var(--petal1) 80%,
    transparent 100%
  );
}

.logo {
  font-family:'Shippori Mincho', serif;
  font-weight:800;
  font-size:1.55rem;
  letter-spacing:3px;
  color: var(--ink);
  flex-shrink:0;
  position:relative;
  display:flex;
  align-items:baseline;
  gap:6px;
}
.logo .logo-num {
  color: var(--accent);
}
.logo .logo-jp {
  font-size:0.62rem;
  letter-spacing:4px;
  color: var(--muted);
  font-weight:400;
  font-family:'Noto Sans JP', sans-serif;
  margin-bottom:2px;
}
.logo-sakura {
  font-size:1rem;
  animation: spin 8s linear infinite;
  display:inline-block;
}
@keyframes spin { to { transform:rotate(360deg); } }

.search-wrap {
  flex:1;
  max-width:460px;
  position:relative;
}
.search-wrap input {
  width:100%;
  background: var(--paper);
  border: 1.5px solid rgba(212,84,122,0.2);
  border-radius: 50px;
  padding:9px 20px 9px 44px;
  color: var(--ink);
  font-family:'Zen Kaku Gothic New', sans-serif;
  font-size:0.88rem;
  outline:none;
  transition: border-color .25s, box-shadow .25s;
  box-shadow: inset 0 1px 4px rgba(212,84,122,0.06);
}
.search-wrap input::placeholder { color: var(--muted); }
.search-wrap input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 4px rgba(212,84,122,0.1), inset 0 1px 4px rgba(212,84,122,0.06);
}
.search-wrap svg {
  position:absolute; left:16px; top:50%;
  transform:translateY(-50%);
  color: var(--petal2);
}

.nav-deco {
  display:flex; align-items:center; gap:6px;
  color: var(--muted);
  font-size:0.75rem;
  letter-spacing:2px;
  font-family:'Noto Sans JP', sans-serif;
  flex-shrink:0;
}

/* ══════════════ HERO ══════════════ */
.hero {
  position:relative; z-index:2;
  padding:70px 52px 50px;
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:40px;
}

.hero-left {}
.hero-kana {
  font-family:'Noto Sans JP', sans-serif;
  font-size:0.72rem;
  letter-spacing:6px;
  color: var(--muted);
  margin-bottom:14px;
  display:flex;
  align-items:center;
  gap:12px;
}
.hero-kana::before, .hero-kana::after {
  content:'';
  flex:1; max-width:40px; height:1px;
  background: linear-gradient(90deg, var(--petal1), transparent);
}
.hero-kana::after {
  background: linear-gradient(270deg, var(--petal1), transparent);
}

.hero h1 {
  font-family:'Shippori Mincho', serif;
  font-size: clamp(3rem, 6vw, 5.5rem);
  font-weight:800;
  line-height:1;
  letter-spacing:4px;
  color: var(--ink);
}
.hero h1 .accent { color: var(--accent); }
.hero h1 .num {
  font-size: 0.7em;
  vertical-align:super;
  color: var(--accent);
}

.hero-sub {
  margin-top:16px;
  font-size:0.88rem;
  color: var(--ink2);
  letter-spacing:2px;
  line-height:1.8;
  font-weight:300;
}

/* branch illustration right side */
.hero-branch {
  flex-shrink:0;
  width:220px;
  height:140px;
  position:relative;
  display:none;
}
@media(min-width:900px){ .hero-branch{ display:block; } }

/* ══════════════ DIVIDER ══════════════ */
.wave-divider {
  position:relative; z-index:2;
  padding:0 52px;
  margin-bottom:8px;
}
.wave-inner {
  border-top:1px solid rgba(212,84,122,0.15);
  display:flex;
  align-items:center;
  gap:14px;
  padding-top:20px;
}
.wave-title {
  font-family:'Shippori Mincho', serif;
  font-size:0.8rem;
  letter-spacing:5px;
  color: var(--accent2);
  white-space:nowrap;
  font-weight:600;
}
.wave-line {
  flex:1; height:1px;
  background: linear-gradient(90deg, rgba(212,84,122,0.2), transparent);
}
.wave-count {
  font-size:0.72rem;
  color: var(--muted);
  letter-spacing:2px;
  font-family:'Noto Sans JP', sans-serif;
}
.wave-petals {
  font-size:0.9rem;
  opacity:0.6;
  letter-spacing:3px;
}

/* ══════════════ CONTINUE SECTION ══════════════ */
#continueSectionWrap {
  position:relative; z-index:2;
}

/* ══════════════ GRID WRAP ══════════════ */
.grid-wrap {
  position:relative; z-index:2;
  padding:24px 52px 100px;
}

/* ══════════════ ANIME GRID ══════════════ */
.anime-grid {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
  gap:22px;
}

.anime-card {
  position:relative;
  cursor:pointer;
  border-radius:12px;
  overflow:hidden;
  aspect-ratio:2/3;
  background: var(--paper);
  border:1px solid rgba(212,84,122,0.12);
  box-shadow: 0 4px 20px var(--shadow), 0 1px 3px rgba(212,84,122,0.06);
  transition: transform .35s ease, box-shadow .35s ease, border-color .35s ease;
  animation: cardBloom .5s ease both;
}
@keyframes cardBloom {
  from { opacity:0; transform:scale(0.94) translateY(14px); }
  to   { opacity:1; transform:scale(1) translateY(0); }
}

.anime-card:hover {
  transform:translateY(-10px) rotate(-0.5deg);
  box-shadow:
    0 24px 60px rgba(212,84,122,0.18),
    0 8px 20px rgba(45,31,38,0.1),
    0 0 0 1.5px rgba(212,84,122,0.3);
  border-color: rgba(212,84,122,0.35);
}

.anime-card img {
  width:100%; height:100%;
  object-fit:cover;
  display:block;
  transition:transform .5s ease, filter .3s;
}
.anime-card:hover img {
  transform:scale(1.06);
  filter:brightness(0.82) saturate(1.1);
}

.card-overlay {
  position:absolute; bottom:0; left:0; right:0;
  padding:55px 14px 16px;
  background: linear-gradient(0deg,
    rgba(45,31,38,0.92) 0%,
    rgba(45,31,38,0.6) 50%,
    transparent 100%
  );
  color:#fff;
}

.card-title {
  font-family:'Shippori Mincho', serif;
  font-weight:700;
  font-size:0.88rem;
  line-height:1.35;
  margin-bottom:5px;
}
.card-meta {
  display:flex; align-items:center; gap:7px;
}
.card-petal { font-size:0.7rem; opacity:0.8; }
.card-eps {
  font-size:0.68rem;
  color:rgba(255,255,255,0.65);
  letter-spacing:1px;
  font-family:'Noto Sans JP', sans-serif;
}

/* hover overlay bloom */
.card-bloom {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  opacity:0;
  transition:opacity .3s;
  z-index:3;
}
.card-bloom-inner {
  width:56px; height:56px;
  border-radius:50%;
  background: rgba(253,246,240,0.2);
  border:1.5px solid rgba(255,255,255,0.6);
  display:flex; align-items:center; justify-content:center;
  backdrop-filter:blur(4px);
  transform:scale(0.7);
  transition:transform .3s;
}
.anime-card:hover .card-bloom { opacity:1; }
.anime-card:hover .card-bloom-inner { transform:scale(1); }
.card-bloom svg { color:#fff; margin-left:2px; }

/* badges */
.card-badge {
  position:absolute; top:10px; left:10px; z-index:4;
  font-family:'Noto Sans JP', sans-serif;
  font-size:0.6rem;
  font-weight:700;
  letter-spacing:1.5px;
  padding:3px 9px;
  border-radius:20px;
}
.badge-new  { background:var(--accent);  color:#fff; box-shadow:0 2px 12px rgba(212,84,122,0.4); }
.badge-exclu{ background:var(--accent2); color:#fff; box-shadow:0 2px 12px rgba(139,79,122,0.4); }
.badge-resume {
  background:var(--green);
  color:#fff;
  box-shadow:0 2px 8px rgba(122,158,126,0.4);
  position:absolute; bottom:52px; right:10px;
  top:auto; left:auto;
}

/* ══════════════ NO RESULTS ══════════════ */
.no-results { display:none; text-align:center; padding:80px; color:var(--muted); }
.no-results.show { display:block; }
.no-results .nr-icon { font-size:3rem; margin-bottom:16px; opacity:0.5; }
.no-results h3 {
  font-family:'Shippori Mincho', serif;
  font-size:1.1rem;
  letter-spacing:3px;
  color:var(--ink2);
  margin-bottom:6px;
}

/* ══════════════ MODAL ══════════════ */
.modal-overlay {
  display:none;
  position:fixed; inset:0; z-index:1000;
  background: rgba(45,31,38,0.7);
  backdrop-filter:blur(14px);
  align-items:center; justify-content:center;
  padding:20px;
}
.modal-overlay.open { display:flex; animation:fadeOver .25s ease; }
@keyframes fadeOver { from{opacity:0} to{opacity:1} }

.modal {
  width:100%; max-width:900px;
  max-height:92vh;
  overflow-y:auto; overflow-x:hidden;
  background: var(--bg2);
  border-radius:18px;
  border:1px solid rgba(212,84,122,0.2);
  box-shadow: 0 40px 100px rgba(45,31,38,0.4), 0 0 0 1px rgba(212,84,122,0.1);
  animation:modalIn .35s cubic-bezier(.34,1.3,.64,1);
  scrollbar-width:thin;
  scrollbar-color:rgba(212,84,122,0.2) transparent;
  position:relative;
}
@keyframes modalIn {
  from{opacity:0; transform:scale(0.92) translateY(20px)}
  to{opacity:1; transform:scale(1) translateY(0)}
}

/* petal corners */
.modal::before, .modal::after {
  content:'🌸';
  position:absolute;
  font-size:1.2rem;
  opacity:0.25;
  pointer-events:none;
}
.modal::before { top:14px; left:16px; }
.modal::after  { top:14px; right:16px; }

.modal-video {
  width:100%; aspect-ratio:16/9;
  background:#1a0d12;
  border-radius:18px 18px 0 0;
  overflow:hidden;
}
.modal-video iframe { width:100%; height:100%; border:none; display:block; }

.modal-body { padding:28px 32px; }

.modal-header {
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:16px;
  margin-bottom:24px;
  padding-bottom:20px;
  border-bottom:1px solid var(--border);
}

.modal-anime-name {
  font-family:'Shippori Mincho', serif;
  font-size:1.75rem;
  font-weight:800;
  letter-spacing:2px;
  color:var(--ink);
  line-height:1;
  margin-bottom:6px;
}
.modal-ep-label {
  display:inline-flex;
  align-items:center;
  gap:6px;
  font-size:0.8rem;
  letter-spacing:1.5px;
  color:var(--accent);
  font-family:'Noto Sans JP', sans-serif;
}

.modal-close {
  background:transparent;
  border:1.5px solid rgba(212,84,122,0.2);
  color:var(--muted);
  width:38px; height:38px;
  border-radius:50%;
  cursor:pointer;
  font-size:0.95rem;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
  transition:all .2s;
}
.modal-close:hover {
  background:var(--accent);
  border-color:var(--accent);
  color:#fff;
  transform:rotate(90deg);
}

/* EP NAV BUTTONS */
.ep-nav {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:28px;
}
.ep-btn {
  background:var(--paper);
  border:1.5px solid rgba(212,84,122,0.18);
  color:var(--ink2);
  padding:11px 16px;
  border-radius:50px;
  cursor:pointer;
  font-family:'Zen Kaku Gothic New', sans-serif;
  font-size:0.82rem;
  font-weight:500;
  letter-spacing:1px;
  display:flex; align-items:center; justify-content:center; gap:8px;
  transition:all .2s;
  box-shadow: 0 2px 8px var(--shadow);
}
.ep-btn:hover:not(:disabled) {
  border-color:var(--accent);
  color:var(--accent);
  box-shadow:0 4px 16px rgba(212,84,122,0.15);
  transform:translateY(-1px);
}
.ep-btn:disabled { opacity:.3; cursor:not-allowed; }
.ep-btn.primary {
  background:linear-gradient(135deg, var(--accent), var(--accent2));
  border-color:transparent;
  color:#fff;
  font-weight:700;
  box-shadow:0 4px 20px rgba(212,84,122,0.3);
}
.ep-btn.primary:hover:not(:disabled) {
  filter:brightness(1.08);
  transform:translateY(-2px);
  box-shadow:0 8px 28px rgba(212,84,122,0.4);
}

/* EP LIST */
.ep-list-label {
  display:flex; align-items:center; gap:10px;
  font-family:'Shippori Mincho', serif;
  font-size:0.8rem;
  letter-spacing:4px;
  color:var(--muted);
  margin-bottom:14px;
  font-weight:600;
}
.ep-list-label::after {
  content:''; flex:1; height:1px;
  background:var(--border);
}

.ep-list { display:flex; flex-direction:column; gap:8px; }

.ep-item {
  display:flex; align-items:center; gap:14px;
  padding:13px 16px;
  background:var(--paper);
  border:1px solid rgba(212,84,122,0.1);
  border-radius:12px;
  cursor:pointer;
  transition:all .22s;
  box-shadow:0 1px 6px var(--shadow);
}
.ep-item:hover {
  border-color:rgba(212,84,122,0.3);
  box-shadow:0 4px 16px rgba(212,84,122,0.1);
  transform:translateX(4px);
}
.ep-item.active {
  background:linear-gradient(135deg, rgba(242,167,184,0.12), rgba(252,213,222,0.18));
  border-color:rgba(212,84,122,0.35);
  box-shadow:0 4px 16px rgba(212,84,122,0.12);
}

.ep-flower { font-size:0.9rem; transition:transform .3s; }
.ep-item:hover .ep-flower, .ep-item.active .ep-flower { transform:rotate(30deg); }

.ep-num {
  font-family:'Shippori Mincho', serif;
  font-size:1.05rem;
  font-weight:700;
  color:var(--accent);
  min-width:40px;
}
.ep-title { flex:1; font-size:0.88rem; color:var(--ink2); }
.ep-chevron { color:var(--muted); font-size:0.75rem; transition:transform .2s; }
.ep-item:hover .ep-chevron, .ep-item.active .ep-chevron {
  color:var(--accent);
  transform:translateX(3px);
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(212,84,122,0.2); border-radius:3px; }
</style>
</head>
<body>

<canvas id="sakuraCanvas"></canvas>

<!-- ══ NAV ══ -->
<nav>
  <div class="logo">
    <span class="logo-num">113</span>
    <span>Anime</span>
    <span class="logo-sakura">🌸</span>
    <span class="logo-jp">アニメ</span>
  </div>

  <div class="search-wrap">
    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="searchInput" placeholder="アニメを検索… Rechercher un anime…" oninput="filterAnime(this.value)">
  </div>

  <div class="nav-deco">🌸 春</div>
</nav>

<!-- ══ HERO ══ -->
<div class="hero">
  <div class="hero-left">
    <div class="hero-kana">春のアニメ</div>
    <h1>
      <span class="num">113</span><span class="accent">Anime</span>
    </h1>
    <p class="hero-sub">Tes Animes Prefere<br>sous les cerisiers en fleur</p>
  </div>
  <svg class="hero-branch" viewBox="0 0 220 140" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Branch -->
    <path d="M10 130 Q60 100 120 70 Q160 50 200 20" stroke="#8b5e6a" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.5"/>
    <path d="M80 85 Q100 65 130 50" stroke="#8b5e6a" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.4"/>
    <path d="M130 68 Q155 55 170 40" stroke="#8b5e6a" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.35"/>
    <!-- Sakura clusters -->
    <g opacity="0.75">
      <circle cx="55" cy="100" r="8" fill="#f2a7b8"/>
      <circle cx="65" cy="94" r="7" fill="#fcd5de"/>
      <circle cx="50" cy="92" r="6" fill="#e8829a"/>
    </g>
    <g opacity="0.8">
      <circle cx="110" cy="72" r="9" fill="#fcd5de"/>
      <circle cx="122" cy="66" r="7" fill="#f2a7b8"/>
      <circle cx="118" cy="78" r="6" fill="#e8829a"/>
    </g>
    <g opacity="0.7">
      <circle cx="160" cy="46" r="8" fill="#f2a7b8"/>
      <circle cx="172" cy="40" r="7" fill="#fcd5de"/>
      <circle cx="155" cy="38" r="5" fill="#e8829a"/>
    </g>
    <!-- Small petals -->
    <circle cx="90" cy="80" r="4" fill="#fcd5de" opacity="0.6"/>
    <circle cx="140" cy="58" r="4" fill="#f2a7b8" opacity="0.55"/>
    <circle cx="185" cy="30" r="3.5" fill="#fcd5de" opacity="0.5"/>
  </svg>
</div>

<!-- ══ CONTINUE ══ -->
<div id="continueSectionWrap"></div>

<!-- ══ SECTION HEADER ══ -->
<div class="wave-divider" id="catalogHeader">
  <div class="wave-inner">
    <span class="wave-title">CATALOGUE</span>
    <span class="wave-petals">🌸 🌸 🌸</span>
    <span class="wave-line"></span>
    <span class="wave-count" id="animeCount"></span>
  </div>
</div>

<!-- ══ GRILLE ══ -->
<div class="grid-wrap">
  <div class="anime-grid" id="animeGrid"></div>
  <div class="no-results" id="noResults">
    <div class="nr-icon">🌸</div>
    <h3>Aucun résultat</h3>
    <p>Essaie un autre titre…</p>
  </div>
</div>

<!-- ══ MODAL ══ -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-video">
      <iframe id="playerFrame" allowfullscreen allow="autoplay; encrypted-media"></iframe>
    </div>
    <div class="modal-body">
      <div class="modal-header">
        <div>
          <div class="modal-anime-name" id="modalAnimeTitle"></div>
          <div class="modal-ep-label">
            <span>🌸</span>
            <span id="modalEpTitle"></span>
          </div>
        </div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>

      <div class="ep-nav">

// ══ SAKURA PETALS ══
const canvas = document.getElementById('sakuraCanvas');
const ctx = canvas.getContext('2d');
let petals = [];
let W, H;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

const COLORS = ['#f2a7b8','#fcd5de','#e8829a','#f9b8c8','#fce4eb'];

function createPetal() {
  return {
    x: Math.random() * W,
    y: -20,
    size: 4 + Math.random() * 8,
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
    speedX: -1 + Math.random() * 2,
    speedY: 0.6 + Math.random() * 1.2,
    rotation: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.04,
    opacity: 0.4 + Math.random() * 0.5,
    swing: Math.random() * Math.PI * 2,
    swingSpeed: 0.01 + Math.random() * 0.02,
  };
}

for (let i = 0; i < 35; i++) {
  const p = createPetal();
  p.y = Math.random() * H;
  petals.push(p);
}

function drawPetal(p) {
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(p.rotation);
  ctx.globalAlpha = p.opacity;
  ctx.fillStyle = p.color;
  ctx.beginPath();
  // simple oval petal
  ctx.ellipse(0, 0, p.size, p.size * 0.55, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function animatePetals() {
  ctx.clearRect(0, 0, W, H);
  if (Math.random() < 0.04) petals.push(createPetal());

  petals.forEach((p, i) => {
    p.swing += p.swingSpeed;
    p.x += p.speedX + Math.sin(p.swing) * 0.5;
    p.y += p.speedY;
    p.rotation += p.rotSpeed;
    drawPetal(p);
    if (p.y > H + 20) petals.splice(i, 1);
  });

  if (petals.length > 60) petals.splice(0, petals.length - 60);
  requestAnimationFrame(animatePetals);
}
animatePetals();

// ══ ÉTAT ══
let currentAnime = null;
let currentEpIndex = 0;

// ══ PROGRESS ══
function saveProgress(id, idx) {
  const d = JSON.parse(localStorage.getItem('113anime_sakura') || '{}');
  d[id] = idx; localStorage.setItem('113anime_sakura', JSON.stringify(d));
}
function getProgress(id) {
  const d = JSON.parse(localStorage.getItem('113anime_sakura') || '{}');
  return d[id] ?? null;
}

// ══ RENDER GRILLE ══
function renderGrid(list) {
  const grid = document.getElementById('animeGrid');
  const noRes = document.getElementById('noResults');
  const count = document.getElementById('animeCount');
  grid.innerHTML = '';
  if (!list.length) { noRes.classList.add('show'); return; }
  noRes.classList.remove('show');
  count.textContent = list.length + ' anime' + (list.length > 1 ? 's' : '');

  list.forEach((anime, i) => {
    const prog = getProgress(anime.id);
    const badgeClass = anime.badge === 'NOUVEAU' ? 'badge-new' : anime.badge === 'EXCLUSIF' ? 'badge-exclu' : '';
    const card = document.createElement('div');
    card.className = 'anime-card';
    card.style.animationDelay = (i * 0.06) + 's';
    card.onclick = () => openModal(anime, prog !== null ? prog : 0);
    card.innerHTML = `
      <img src="${anime.cover}" alt="${anime.titre}" loading="lazy">
      ${anime.badge ? `<div class="card-badge ${badgeClass}">${anime.badge}</div>` : ''}
      ${prog !== null ? `<div class="card-badge badge-resume">▶ ÉP.${prog+1}</div>` : ''}
      <div class="card-bloom">
        <div class="card-bloom-inner">
          <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
      </div>
      <div class="card-overlay">
        <div class="card-title">${anime.titre}</div>
        <div class="card-meta">
          <span class="card-petal">🌸</span>
          <span class="card-eps">${anime.episodes.length} épisode${anime.episodes.length > 1 ? 's' : ''}</span>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

// ══ SECTION CONTINUER ══
function renderContinue() {
  const d = JSON.parse(localStorage.getItem('113anime_sakura') || '{}');
  const ids = Object.keys(d);
  const wrap = document.getElementById('continueSectionWrap');
  wrap.innerHTML = '';
  if (!ids.length) return;

  wrap.innerHTML = `
    <div class="wave-divider">
      <div class="wave-inner">
        <span class="wave-title" style="color:var(--green)">CONTINUER À REGARDER</span>
        <span class="wave-petals">🌿 🌸 🌿</span>
        <span class="wave-line"></span>
      </div>
    </div>
    <div class="grid-wrap" style="padding-bottom:0">
      <div class="anime-grid" id="continueGrid"></div>
    </div>
  `;

  const grid = document.getElementById('continueGrid');
  ids.forEach(id => {
    const anime = ANIMES.find(a => a.id == id);
    if (!anime) return;
    const idx = d[id];
    const ep = anime.episodes[idx];
    const card = document.createElement('div');
    card.className = 'anime-card';
    card.onclick = () => openModal(anime, idx);
    card.innerHTML = `
      <img src="${anime.cover}" alt="${anime.titre}" loading="lazy">
      <div class="card-badge badge-resume">▶ ÉP.${idx+1}</div>
      <div class="card-bloom">
        <div class="card-bloom-inner">
          <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
      </div>
      <div class="card-overlay">
        <div class="card-title">${anime.titre}</div>
        <div class="card-meta">
          <span class="card-petal">🌿</span>
          <span class="card-eps" style="color:rgba(255,255,255,0.8)">${ep.titre}</span>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

// ══ RECHERCHE ══
function filterAnime(q) {
  const filtered = q ? ANIMES.filter(a => a.titre.toLowerCase().includes(q.toLowerCase())) : ANIMES;
  renderGrid(filtered);
}

// ══ MODAL ══
function openModal(anime, epIndex = 0) {
  currentAnime = anime; currentEpIndex = epIndex;
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
  playEpisode(epIndex);
  buildEpList();
}

function playEpisode(index) {
  currentEpIndex = index;
  const ep = currentAnime.episodes[index];
  saveProgress(currentAnime.id, index);

  document.getElementById('modalAnimeTitle').textContent = currentAnime.titre;
  document.getElementById('modalEpTitle').textContent = `Épisode ${index + 1} — ${ep.titre}`;

  const url = ep.url.includes('?') ? ep.url + '&autoplay=1' : ep.url + '?autoplay=1';
  document.getElementById('playerFrame').src = url;

  document.getElementById('prevBtn').disabled = index === 0;
  document.getElementById('nextBtn').disabled = index === currentAnime.episodes.length - 1;

  document.querySelectorAll('.ep-item').forEach((el,i) => el.classList.toggle('active', i === index));
  document.querySelector('.modal').scrollTo({top:0, behavior:'smooth'});
  renderGrid(ANIMES);
  renderContinue();
}

function buildEpList() {
  const list = document.getElementById('epList');
  list.innerHTML = '';
  currentAnime.episodes.forEach((ep, i) => {
    const item = document.createElement('div');
    item.className = 'ep-item' + (i === currentEpIndex ? ' active' : '');
    item.onclick = () => playEpisode(i);
    item.innerHTML = `
      <span class="ep-flower">🌸</span>
      <div class="ep-num">ÉP.${String(i+1).padStart(2,'0')}</div>
      <div class="ep-title">${ep.titre}</div>
      <div class="ep-chevron">▶</div>
    `;
    list.appendChild(item);
  });
}

function navigate(dir) {
  const next = currentEpIndex + dir;
  if (next >= 0 && next < currentAnime.episodes.length) playEpisode(next);
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('playerFrame').src = '';
  document.body.style.overflow = '';
}

document.getElementById('modal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

renderGrid(ANIMES);
renderContinue();
</script>
